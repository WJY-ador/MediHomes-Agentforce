<template>
    <div class="prechat-wrap">
        <div class="prechat-header">
            <div class="brand">
                <div class="brand-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="20" height="20">
                        <path d="M11.645 20.91l-.007-.003-.022-.012a15.247 15.247 0 0 1-.383-.218 25.18 25.18 0 0 1-4.244-3.17C4.688 15.36 2.25 12.174 2.25 8.25 2.25 5.322 4.714 3 7.688 3A5.5 5.5 0 0 1 12 5.052 5.5 5.5 0 0 1 16.313 3c2.973 0 5.437 2.322 5.437 5.25 0 3.925-2.438 7.111-4.739 9.256a25.175 25.175 0 0 1-4.244 3.17 15.247 15.247 0 0 1-.383.219l-.022.012-.007.004-.003.001a.752.752 0 0 1-.704 0l-.003-.001Z" />
                    </svg>
                </div>
                <span class="brand-name">메디홈즈</span>
            </div>
            <h2 class="prechat-title">AI 상담 서비스</h2>
            <p class="prechat-subtitle">양압기 관련 궁금한 점을 빠르게 안내해 드립니다</p>
        </div>

        <div class="prechat-body">
            <div class="field-group">
                <label class="field-label" for="name">성함 <span class="required">*</span></label>
                <input
                    id="name"
                    class="field-input"
                    type="text"
                    placeholder="이름을 입력해 주세요"
                    value={name}
                    oninput={handleNameInput}
                />
            </div>

            <div class="field-group">
                <label class="field-label" for="inquiry">문의 유형</label>
                <select id="inquiry" class="field-select" onchange={handleInquiryChange}>
                    <option value="">선택해 주세요</option>
                    <option value="기기 사용 문의">기기 사용 문의</option>
                    <option value="계약 / 결제 문의">계약 / 결제 문의</option>
                    <option value="처방 / 보험 문의">처방 / 보험 문의</option>
                    <option value="AS / 수리 요청">AS / 수리 요청</option>
                    <option value="기타">기타</option>
                </select>
            </div>

            <button class="submit-btn" onclick={handleSubmit} disabled={isSubmitDisabled}>
                상담 시작하기
                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="16" height="16">
                    <path fill-rule="evenodd" d="M3 10a.75.75 0 0 1 .75-.75h10.638L10.23 5.29a.75.75 0 1 1 1.04-1.08l5.5 5.25a.75.75 0 0 1 0 1.08l-5.5 5.25a.75.75 0 1 1-1.04-1.08l4.158-3.96H3.75A.75.75 0 0 1 3 10Z" clip-rule="evenodd" />
                </svg>
            </button>
        </div>

        <div class="prechat-footer">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 20 20" fill="currentColor" width="12" height="12">
                <path fill-rule="evenodd" d="M2 3.5A1.5 1.5 0 0 1 3.5 2h1.148a1.5 1.5 0 0 1 1.465 1.175l.716 3.223a1.5 1.5 0 0 1-1.052 1.767l-.933.267c-.41.117-.643.555-.48.95a11.542 11.542 0 0 0 6.254 6.254c.395.163.833-.07.95-.48l.267-.933a1.5 1.5 0 0 1 1.767-1.052l3.223.716A1.5 1.5 0 0 1 18 15.352V16.5a1.5 1.5 0 0 1-1.5 1.5H15c-1.149 0-2.263-.15-3.326-.43A13.022 13.022 0 0 1 2.43 8.326 13.019 13.019 0 0 1 2 5V3.5Z" clip-rule="evenodd" />
            </svg>
            운영시간 평일 09:00 – 18:00 &nbsp;|&nbsp; 콜센터 1670-3171
        </div>
    </div>
</template>
